<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- African pattern arc -->
  <path d="M 300 220 A 200 200 0 0 1 700 220" stroke="#D4A574" stroke-width="20" fill="none"/>
  <g stroke="#D4A574" stroke-width="8" fill="none">
    <path d="M 330 210 L 350 190 L 370 210"/>
    <path d="M 380 210 L 400 190 L 420 210"/>
    <path d="M 430 210 L 450 190 L 470 210"/>
    <path d="M 480 210 L 500 190 L 520 210"/>
    <path d="M 530 210 L 550 190 L 570 210"/>
    <path d="M 580 210 L 600 190 L 620 210"/>
    <path d="M 630 210 L 650 190 L 670 210"/>
  </g>
  
  <!-- Dots -->
  <circle cx="700" cy="280" r="8" fill="#D4A574"/>
  <circle cx="720" cy="300" r="6" fill="#D4A574"/>
  <circle cx="735" cy="320" r="4" fill="#D4A574"/>
  
  <!-- "Sujo" text -->
  <text x="200" y="480" font-family="Georgia, serif" font-size="180" font-weight="bold" fill="#0F3D2E">Sujo</text>
  
  <!-- Pot icon in the "o" -->
  <g transform="translate(680, 350)">
    <!-- Pot body -->
    <ellipse cx="0" cy="30" rx="35" ry="25" fill="#8B6F47"/>
    <path d="M -35 30 Q -35 50 -25 60 L 25 60 Q 35 50 35 30 Z" fill="#A0826D"/>
    <ellipse cx="0" cy="30" rx="30" ry="20" fill="#C19A6B"/>
    
    <!-- Pot rim -->
    <ellipse cx="0" cy="5" rx="40" ry="8" fill="#8B6F47"/>
    <ellipse cx="0" cy="5" rx="35" ry="6" fill="#A0826D"/>
    
    <!-- People around pot -->
    <circle cx="-25" cy="-15" r="8" fill="#D4A574"/>
    <circle cx="0" cy="-20" r="8" fill="#D4A574"/>
    <circle cx="25" cy="-15" r="8" fill="#D4A574"/>
  </g>
  
  <!-- Gold dot accent -->
  <circle cx="600" cy="320" r="12" fill="#D4A574"/>
  
  <!-- "WE RISE TOGETHER" tagline -->
  <line x1="215" y1="530" x2="295" y2="530" stroke="#D4A574" stroke-width="3"/>
  <circle cx="300" cy="530" r="4" fill="#D4A574"/>
  <text x="320" y="540" font-family="Arial, sans-serif" font-size="28" font-weight="bold" letter-spacing="4" fill="#D4A574">WE RISE TOGETHER</text>
  <circle cx="700" cy="530" r="4" fill="#D4A574"/>
  <line x1="705" y1="530" x2="785" y2="530" stroke="#D4A574" stroke-width="3"/>
</svg>
